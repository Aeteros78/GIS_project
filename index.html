<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГИС-приложение по подбору гостиниц в Санкт-Петербурге</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="scripts/map.js" defer></script>
    <script src="scripts/filters.js" defer></script>
</head>
<body>
    <header class="app-header">
        <h1>ГИС-приложение по подбору гостиниц в Санкт-Петербурге</h1>
    </header>
    <!-- Основная область: карта + боковая панель -->
    <main class="app-main">
        <!-- Карта (Яндекс.Карты) -->
        <section class="map-section">
            <div id="map">
            <!-- Здесь через JS API Яндекс.Карт инициализируется карта,а также добавляются точки гостиниц, станции метро и границы районов -->
            </div>
        </section>
        <!-- Боковая панель: фильтры и список гостиниц -->
        <aside class="sidebar">
            <!-- Фильтры поиска -->
            <section class="filters">
                <h2>Поиск и фильтрация</h2>
                <form id="filters-form">
                    <!-- Район (из таблицы districts_spb) -->
                    <div class="form-group">
                        <label for="district">Район:</label>
                        <select id="district" name="district">
                            <option value="">Все районы</option>
                            <!-- Список районов подставляется из БД -->
                        </select>
                    </div>
                    <!-- Станция метро (из таблицы metro_stations) -->
                    <div class="form-group">
                        <label for="metro">Станция метро:</label>
                        <select id="metro" name="metro">
                            <option value="">Все станции</option>
                            <!-- Список станций подставляется из БД -->
                        </select>
                    </div>
                    <!-- Звёздность (category) -->
                    <div class="form-group">
                        <label for="stars">Звёздность:</label>
                        <select id="stars" name="stars">
                            <option value="">Любая</option>
                            <option value="5">5★</option>
                            <option value="4">4★</option>
                            <option value="3">3★</option>
                            <option value="2">2★</option>
                            <option value="1">1★</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit">Применить фильтры</button>
                    </div>
                </form>
            </section>
        </aside>
    </main>
</body>
</html>
