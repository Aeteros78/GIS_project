<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГИС-приложение по подбору гостиниц в Санкт-Петербурге</title>
</head>
<body>
    <header class="app-header">
        <h1>ГИС-приложение по подбору гостиниц в Санкт-Петербурге</h1>
    </header>
    <!-- Основная область: карта + боковая панель -->
    <main class="app-main">
        <!-- Карта (Яндекс.Карты) -->
        <section class="map-section">
            <div id="map">
            <!-- Здесь через JS API Яндекс.Карт инициализируется карта,а также добавляются точки гостиниц, станции метро и границы районов -->
            </div>
        </section>
        <!-- Боковая панель: фильтры и список гостиниц -->
        <aside class="sidebar">
            <!-- Фильтры поиска -->
            <section class="filters">
                <h2>Поиск и фильтрация</h2>
            </section>
        </aside>
    </main>
</body>
</html>
