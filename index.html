<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ГИС-приложение по подбору гостиниц в Санкт-Петербурге</title>
</head>
<body>
    <header class="app-header">
        <h1>ГИС-приложение по подбору гостиниц в Санкт-Петербурге</h1>
    </header>
    <!-- Основная область: карта + боковая панель -->
    <main class="app-main">
        <!-- Карта (Яндекс.Карты) -->
        <section class="map-section">
            <div id="map">
            <!-- Здесь через JS API Яндекс.Карт инициализируется карта,а также добавляются точки гостиниц, станции метро и границы районов -->
            </div>
        </section>
        <!-- Боковая панель: фильтры и список гостиниц -->
        <aside class="sidebar">
            <!-- Фильтры поиска -->
            <section class="filters">
                <h2>Поиск и фильтрация</h2>
                <form id="filters-form">
                    <!-- Район (из таблицы districts_spb) -->
                    <div class="form-group">

                    </div>
                    <!-- Станция метро (из таблицы metro_stations) -->
                    <div class="form-group">

                    </div>
                    <!-- Звёздность (category) -->
                    <div class="form-group">

                    </div>
                    <div class="form-actions">
                        <button type="submit">Применить фильтры</button>
                    </div>
                </form>
            </section>
        </aside>
    </main>
</body>
</html>
